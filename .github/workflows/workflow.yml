name: ML Ops Assignment 2
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ml-ops-assignment2:
    runs-on: ubuntu-latest
    env:
      WANDB_PROJECT: ml-ops-assignment2
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_API_KEY }}
      HF_REPO_ID: sureshbabugandla/ML_OPS_ASSIGNMENT2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ml-ops-assignment2 .

      - name: Run ML pipeline
        run: |
          docker run --rm \
            -e WANDB_API_KEY="${WANDB_API_KEY}" \
            -e WANDB_PROJECT="${WANDB_PROJECT}" \
            -e HF_TOKEN="${HF_TOKEN}" \
            -e HF_REPO_ID="${HF_REPO_ID}" \
            ml-ops-assignment2