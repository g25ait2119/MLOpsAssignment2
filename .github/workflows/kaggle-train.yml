name: Kaggle Training Pipeline

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force trigger Kaggle training'
        required: false
        default: 'true'
  push:
    branches: [main]
    paths:
      - 'code/**'
      - 'kaggle/**'

jobs:
  kaggle-train:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_KEY }}
      KAGGLE_USERNAME: sureshbabugandla
      KERNEL_SLUG: sureshbabugandla/mlops-assignment2-training
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Push kernel to Kaggle
        run: |
          echo "Pushing kernel to Kaggle..."
          cd kaggle
          python -c "
          from kaggle.api.kaggle_api_extended import KaggleApi
          api = KaggleApi()
          api.authenticate()
          api.kernels_push_cli('.', timeout=None, acc=None)
          print('Kernel pushed successfully!')
          "
          echo "Waiting for execution to start..."
          sleep 30

      - name: Wait for Kaggle kernel to complete
        run: |
          MAX_WAIT=7200
          INTERVAL=60
          ELAPSED=0

          echo "Monitoring kernel: $KERNEL_SLUG"

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(python -c "
          from kaggle.api.kaggle_api_extended import KaggleApi
          api = KaggleApi()
          api.authenticate()
          status = api.kernels_status('$KERNEL_SLUG')
          print(status)
          " 2>&1 || true)
            echo "[$((ELAPSED/60))m] Status: $STATUS"

            if echo "$STATUS" | grep -qi "complete"; then
              echo "Kernel completed successfully!"
              exit 0
            fi

            if echo "$STATUS" | grep -qi "error\|cancel"; then
              echo "Kernel failed or was cancelled!"
              echo "$STATUS"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "ERROR: Timeout after $((MAX_WAIT/60)) minutes"
          exit 1

      - name: Download kernel output
        run: |
          mkdir -p kaggle_output
          python -c "
          from kaggle.api.kaggle_api_extended import KaggleApi
          api = KaggleApi()
          api.authenticate()
          api.kernels_output_cli('$KERNEL_SLUG', path='./kaggle_output/')
          "
          echo "Downloaded output files:"
          ls -la kaggle_output/
          if [ -f kaggle_output/metrics.json ]; then
            echo "Metrics:"
            cat kaggle_output/metrics.json
          fi

      - name: Update README with training metrics
        run: python scripts/update_readme.py

      - name: Commit and push updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to README.md"
          else
            git commit -m "docs: update README with training metrics from Kaggle [skip ci]"
            git push
            echo "README.md updated and pushed!"
          fi

      - name: Upload metrics as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-metrics
          path: kaggle_output/
          retention-days: 90
